[program:sirpl-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/sirpl/backend/artisan queue:work database --queue=default --sleep=3 --tries=3 --timeout=60 --max-time=3600
directory=/var/www/sirpl/backend
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
stopwaitsecs=90
numprocs=2
redirect_stderr=true
stdout_logfile=/var/log/supervisor/sirpl-worker.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=10
